# DPSDESK coturn configuration
# TURN/STUN server for WebRTC relay (internet public NAT traversal)

listening-port=3478
tls-listening-port=5349

# HMAC time-limited credentials (coturn lt-cred-mech)
fingerprint
lt-cred-mech
use-auth-secret
static-auth-secret=CHANGE_THIS_STRONG_SECRET_32CHARS

realm=dpsdesk.local

# Security: block localhost and multicast
no-loopback-peers
no-multicast-peers

# Logging
log-file=/var/log/coturn/turnserver.log
