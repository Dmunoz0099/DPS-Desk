services:
  - type: web
    name: dpsdesk-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      # Render expone RENDER_EXTERNAL_URL automáticamente; el código lo usa para
      # auto-ping cada 10 min y evitar el spin-down del free tier.
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
